services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-blog
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - blog_data:/app/data
      - ./public/uploads:/app/public/uploads
      - ./old:/app/old
    networks:
      default:
      sporza_proxy:
        aliases:
          - telegram-blog

volumes:
  blog_data:

networks:
  sporza_proxy:
    external: true
    name: sporza_default
