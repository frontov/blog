services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-blog
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
      - ./old:/app/old
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: blog-caddy
    restart: unless-stopped
    depends_on:
      - blog
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile.blog:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
